name: sitectl-create-smoke-test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sitectl-create-smoke-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  create:
    name: sitectl create omeka-s ${{ matrix.create_definition }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - create_definition: default
            create_args: ""
    uses: libops/.github/.github/workflows/sitectl-create-smoke-test.yaml@55489923a34bd3714d2a1b9c5f8a6c678ea1cbfe # main
    with:
      plugin: omeka-s
      create-definition: ${{ matrix.create_definition }}
      create-args: ${{ matrix.create_args }}
      packages: sitectl sitectl-omeka-s
      package-versions: sitectl=0.40.0 sitectl-omeka-s=0.6.0
      allow-unversioned-packages: false
