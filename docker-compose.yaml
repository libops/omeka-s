---
x-common: &common
  restart: unless-stopped
  networks:
    default:

networks:
  default:

volumes:
  acme-data: {}
  mariadb-data: {}
  omeka-s-files: {}

secrets:
  DB_ROOT_PASSWORD:
    file: ./secrets/DB_ROOT_PASSWORD
  OMEKA_S_DB_PASSWORD:
    file: ./secrets/OMEKA_S_DB_PASSWORD
  OMEKA_S_ADMIN_PASSWORD:
    file: ./secrets/OMEKA_S_ADMIN_PASSWORD

services:
  init:
    image: islandora/base:6.2.3@sha256:010f7e422ad4563f91335106215a72c7485635b0a1125c651b4e76cb6d7efbd4
    restart: no
    volumes:
      - ./secrets:/secrets:rw
      - ./scripts:/scripts:ro
      - ./docker-compose.yaml:/docker-compose.yaml:ro
    command: /scripts/generate-secrets.sh
    profiles: [none]

  traefik:
    <<: *common
    image: traefik:v3.6.13@sha256:34d5089d0b414945342848518b383f11f5b3a645504ed87b77ffeb9d683d0e48
    command:
      - --providers.file.filename=/etc/traefik/dynamic/omeka-s.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      TRAEFIK_TLS_ENABLED: "false"
    ports:
      - "${HOST_INSECURE_PORT:-80}:80"
    volumes:
      - ./conf/traefik/omeka-s.tmpl:/etc/traefik/dynamic/omeka-s.yml:ro
    depends_on:
      omeka-s:
        condition: service_healthy

  omeka-s:
    <<: *common
    image: ghcr.io/libops/omeka-s:main
    build:
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      LIBOPS_SMTP_HOST: "${LIBOPS_SMTP_HOST:-host.docker.internal}"
      LIBOPS_SMTP_PORT: "${LIBOPS_SMTP_PORT:-25}"
      SMTP_FROM: "${SMTP_FROM:-}"
      OMEKA_S_ENABLE_HTTPS: "false"
    secrets:
      - source: DB_ROOT_PASSWORD
      - source: OMEKA_S_DB_PASSWORD
        target: DB_PASSWORD
      - source: OMEKA_S_ADMIN_PASSWORD
    volumes:
      - omeka-s-files:/var/www/omeka-s/files:rw
    depends_on:
      mariadb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mariadb:
    <<: *common
    image: islandora/mariadb:6.2.3@sha256:3c6e7cbed734310f4d9fea7a4f08e7e282ecb1a5e73aec0ab79b4167930380ab
    volumes:
      - mariadb-data:/var/lib/mysql:rw
    secrets:
      - source: DB_ROOT_PASSWORD
