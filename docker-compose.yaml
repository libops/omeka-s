---
x-common: &common
  restart: unless-stopped
  networks:
    default:

networks:
  default:

volumes:
  mariadb-data: {}
  omeka-s-files: {}

secrets:
  DB_ROOT_PASSWORD:
    file: ./secrets/DB_ROOT_PASSWORD
  OMEKA_S_DB_PASSWORD:
    file: ./secrets/OMEKA_S_DB_PASSWORD
  OMEKA_S_ADMIN_PASSWORD:
    file: ./secrets/OMEKA_S_ADMIN_PASSWORD

services:
  init:
    image: libops/base:3.2.2.0@sha256:d4da77a62c6dead3d52c0e0cc4f38647379d7edd8b2be7b17a2cce06d469b545
    restart: no
    working_dir: /
    volumes:
      - ./secrets:/secrets:rw,z
      - ./scripts:/scripts:ro,z
      - ./docker-compose.yaml:/docker-compose.yaml:ro,z
    command: /scripts/generate-secrets.sh
    profiles: [none]

  traefik:
    <<: *common
    image: traefik:v3.7.8@sha256:4299bbed850421258fc5448c2e0e6ad350981d4d335a68de11b92448aedbefe5
    command:
      - --ping=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=300s
    ports:
      - "80:80"
    volumes:
      - ./conf/traefik:/etc/traefik/dynamic:ro,z
    depends_on:
      omeka-s:
        condition: service_healthy
    healthcheck:
      test: traefik healthcheck --ping
      start_period: 10s

  omeka-s:
    <<: *common
    build:
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      INGRESS_HOSTNAMES: "localhost"
      INGRESS_SCHEME: "http"
      LIBOPS_SMTP_HOST: "${LIBOPS_SMTP_HOST:-host.docker.internal}"
      LIBOPS_SMTP_PORT: "${LIBOPS_SMTP_PORT:-25}"
      SMTP_FROM: "${SMTP_FROM:-}"
    secrets:
      - source: OMEKA_S_DB_PASSWORD
        target: DB_PASSWORD
      - source: OMEKA_S_ADMIN_PASSWORD
    volumes:
      - omeka-s-files:/var/www/omeka-s/files:rw
    depends_on:
      database-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /installed && test -f /var/www/omeka-s/index.php && wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5m

  database-init:
    image: libops/base:3.2.2.0@sha256:d4da77a62c6dead3d52c0e0cc4f38647379d7edd8b2be7b17a2cce06d469b545
    restart: "no"
    networks:
      default:
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: omeka_s
      DB_USER: omeka_s
      DB_CHARACTER_SET: utf8mb4
      DB_COLLATION: utf8mb4_unicode_ci
    secrets:
      - source: DB_ROOT_PASSWORD
      - source: OMEKA_S_DB_PASSWORD
        target: DB_PASSWORD
    volumes:
      - ./scripts/init-database.sh:/usr/local/bin/init-database.sh:ro,z
    entrypoint: /usr/local/bin/init-database.sh
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    <<: *common
    image: libops/mariadb:11@sha256:7e0eb90c7cba204b62e8bed72fba00193cbc2e50072fc6e40a6fab8de4b0b857
    volumes:
      - mariadb-data:/var/lib/mysql:rw
    secrets:
      - source: DB_ROOT_PASSWORD
